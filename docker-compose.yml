version: "3.8"

services:
  db:
    image: postgres:15
    container_name: wodgod-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wodgod}
      POSTGRES_USER: ${POSTGRES_USER:-wodgod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wodgod_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wodgod}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: wodgod-backend
    restart: unless-stopped
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-wodgod}
      POSTGRES_USER: ${POSTGRES_USER:-wodgod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wodgod_dev}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:11434}
      LLM_MODEL: ${LLM_MODEL:-llama3}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-6}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-72}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
